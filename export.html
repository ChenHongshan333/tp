<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CatPals Export</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { color: #333; }
    .cat-card { display: flex; align-items: center; gap: 16px;
                border: 1px solid #ccc; border-radius: 8px;
                padding: 12px; margin-bottom: 12px; }
    .cat-card img { width: 80px; height: 80px; object-fit: cover;
                    border-radius: 4px; }
    .cat-card .no-image { width: 80px; height: 80px; background: #eee;
                          border-radius: 4px; display: flex;
                          align-items: center; justify-content: center;
                          color: #aaa; font-size: 12px; }
    .cat-name { font-size: 1.1em; font-weight: bold; }
    .cat-detail { color: #555; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>CatPals Export</h1>
  <p>3 cat(s) listed.</p>
  <div class="cat-card">
    <img src="images\bowie.png" alt="Whiskers">
    <div>
      <div class="cat-name">1. Whiskers</div>
      <div class="cat-detail">Traits: Fluffy, Playful</div>
      <div class="cat-detail">Location: Science</div>
      <div class="cat-detail">Health: Unknown</div>
    </div>
  </div>
  <div class="cat-card">
    <div class="no-image">No image</div>
    <div>
      <div class="cat-name">2. happy</div>
      <div class="cat-detail">Traits: white</div>
      <div class="cat-detail">Location: PGPR</div>
      <div class="cat-detail">Health: Unknown</div>
    </div>
  </div>
  <div class="cat-card">
    <img src="images\Snowy.png" alt="Snowy">
    <div>
      <div class="cat-name">3. Snowy</div>
      <div class="cat-detail">Traits: brown</div>
      <div class="cat-detail">Location: RC4</div>
      <div class="cat-detail">Health: Unknown</div>
    </div>
  </div>
</body>
</html>
